# ==============================================================================
# FLUXVERDE — PostgreSQL Configuration
# Optimised for TimescaleDB time-series workloads
# Target hardware: 8–16 GB RAM, 4–8 CPU cores (typical on-premise mini server)
# ==============================================================================
# After changing this file:
#   docker-compose restart db
# ==============================================================================

# ── CONNECTION ─────────────────────────────────────────────────────────────────
listen_addresses = '*'
port             = 5432
max_connections  = 100          # Spring Boot uses HikariCP pool — 100 is plenty

# ── MEMORY ─────────────────────────────────────────────────────────────────────
# Rule of thumb: shared_buffers = 25% of total RAM
# Adjust these values to match your server's actual RAM

shared_buffers              = 2GB       # For 8GB server — increase to 4GB for 16GB server
effective_cache_size        = 6GB       # ~75% of total RAM — helps query planner
work_mem                    = 64MB      # Per sort/hash operation — higher = faster aggregations
maintenance_work_mem        = 512MB     # For VACUUM, CREATE INDEX, etc.
wal_buffers                 = 64MB      # WAL write performance

# ── CHECKPOINTS ────────────────────────────────────────────────────────────────
checkpoint_completion_target = 0.9
checkpoint_timeout           = 15min
max_wal_size                 = 2GB
min_wal_size                 = 256MB

# ── QUERY PLANNER ──────────────────────────────────────────────────────────────
random_page_cost    = 1.1       # SSD: keep at 1.1 | HDD: set to 4.0
effective_io_concurrency = 200  # SSD: 200 | HDD: 2
default_statistics_target = 100

# ── PARALLELISM ────────────────────────────────────────────────────────────────
# TimescaleDB benefits significantly from parallel query execution
max_parallel_workers_per_gather = 2
max_parallel_workers            = 4
max_parallel_maintenance_workers = 2
parallel_tuple_cost  = 0.1
parallel_setup_cost  = 1000

# ── TIMESCALEDB ────────────────────────────────────────────────────────────────
shared_preload_libraries = 'timescaledb'

# TimescaleDB max background workers
# Set to number of databases × number of concurrent chunk operations
timescaledb.max_background_workers = 8

# ── WAL / REPLICATION ──────────────────────────────────────────────────────────
wal_level            = replica   # Enables logical replication if needed later
max_wal_senders      = 3
wal_keep_size        = 256MB

# ── VACUUM / AUTOVACUUM ────────────────────────────────────────────────────────
# MeterReading is insert-heavy with rare updates — tune autovacuum accordingly
autovacuum                       = on
autovacuum_max_workers           = 3
autovacuum_naptime               = 1min
autovacuum_vacuum_scale_factor   = 0.05   # Vacuum after 5% of rows change
autovacuum_analyze_scale_factor  = 0.02   # Analyze after 2% of rows change
autovacuum_vacuum_cost_delay     = 2ms

# ── LOGGING ────────────────────────────────────────────────────────────────────
log_destination          = 'stderr'
logging_collector        = off           # Docker handles log collection
log_min_duration_statement = 1000        # Log queries slower than 1 second
log_line_prefix          = '%t [%p] %u@%d '
log_timezone             = 'UTC'
log_checkpoints          = on
log_connections          = off           # Too noisy with connection pooling
log_disconnections       = off
log_lock_waits           = on
log_temp_files           = 10MB          # Log temp files larger than 10MB

# ── TIMEZONE ───────────────────────────────────────────────────────────────────
timezone     = 'UTC'                     # Always store timestamps in UTC
datestyle    = 'iso, mdy'
lc_messages  = 'en_US.utf8'
lc_monetary  = 'en_US.utf8'
lc_numeric   = 'en_US.utf8'
lc_time      = 'en_US.utf8'

# ── MISC ───────────────────────────────────────────────────────────────────────
track_activity_query_size = 2048
track_io_timing           = on           # Needed for TimescaleDB query analysis
